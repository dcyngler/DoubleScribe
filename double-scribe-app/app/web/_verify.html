<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Double Scribe</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="styles.css">
<style>.card-actions{display:flex !important}</style></head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-badge" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
      </div>
      <span class="brand-name">Double Scribe</span>
      <button class="sidebar-toggle" id="sidebarToggle" title="Collapse sidebar" aria-expanded="true">
        <svg viewBox="0 0 24 24" class="ico">
          <rect x="3" y="5" width="18" height="14" rx="2.5"/>
          <line x1="9.5" y1="5" x2="9.5" y2="19"/>
          <path d="M7 9.5l-2 2.5 2 2.5"/>
        </svg>
      </button>
    </div>

    <nav class="nav" id="nav">
      <button class="nav-item active" data-view="all">
        <svg viewBox="0 0 24 24" class="ico"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        <span>All transcripts</span>
      </button>
      <button class="nav-item" data-view="favourites">
        <svg viewBox="0 0 24 24" class="ico"><path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/></svg>
        <span>Favourites</span>
      </button>
      <div class="nav-section-label">Tags</div>
      <div id="tagNav" class="nav-sub"></div>
      <div class="nav-section-label">Folders</div>
      <div id="folderNav" class="nav-sub"></div>
    </nav>

    <div class="sidebar-foot">
      <button class="settings-btn" id="audioSettingsBtn">
        <svg viewBox="0 0 24 24" class="ico"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.4 1a7 7 0 0 0-1.7-1L14.5 3h-5l-.3 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.4-1a7 7 0 0 0 1.7 1L9.5 21h5l.3-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.5-2-1.5a7 7 0 0 0 .1-1z"/></svg>
        <span>Audio settings</span>
      </button>
      <div class="device-pills" id="devicePills"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Idle top bar -->
    <header class="topbar" id="topbarIdle">
      <h1 class="page-title" id="pageTitle">All transcripts</h1>
      <div class="topbar-actions">
        <button class="btn-icon" id="searchToggle" title="Search">
          <svg viewBox="0 0 24 24" class="ico"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>
        <button class="btn-primary" id="startBtn" disabled>
          <span class="dot-red"></span> Start listening
        </button>
      </div>
    </header>

    <!-- Recording top bar -->
    <header class="topbar recording hidden" id="topbarRec">
      <div class="rec-left">
        <span class="dot-red pulse"></span>
        <span class="rec-timer" id="recTimer">00:00</span>
      </div>
      <input class="rec-title" id="recTitle" placeholder="Name this recording..." autocomplete="off">
      <button class="btn-stop" id="stopBtn">Stop listening</button>
    </header>

    <!-- Search bar -->
    <div class="searchbar hidden" id="searchBar">
      <svg viewBox="0 0 24 24" class="ico"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchInput" placeholder="Search transcripts...">
      <button class="btn-icon" id="searchClose">&times;</button>
    </div>

    <!-- Body: list + detail -->
    <div class="body">
      <div class="list-col" id="listCol">
        <div class="list-toolbar">
          <button class="list-toggle" id="listToggle" title="Collapse list">
            <svg viewBox="0 0 24 24" class="ico">
              <rect x="3" y="5" width="18" height="14" rx="2.5"/>
              <line x1="9.5" y1="5" x2="9.5" y2="19"/>
              <path d="M7 9.5l-2 2.5 2 2.5"/>
            </svg>
          </button>
        </div>
        <section class="list-panel" id="listPanel"></section>
      </div>
      <section class="detail-panel hidden" id="detailPanel"></section>
      <section class="live-panel hidden" id="livePanel">
        <div class="live-head">Live transcript</div>
        <div class="live-body" id="liveBody"></div>
      </section>
    </div>
  </main>
</div>

<!-- Audio settings modal -->
<div class="modal-overlay hidden" id="audioModal">
  <div class="modal">
    <div class="modal-head">
      <h2>Audio settings</h2>
      <button class="btn-icon" id="audioClose">&times;</button>
    </div>
    <label class="field">
      <span>System audio output <em>(the call / people you hear)</em></span>
      <select id="outSelect"></select>
    </label>
    <label class="field">
      <span>Microphone input <em>(you)</em></span>
      <select id="inSelect"></select>
    </label>
    <div class="modal-foot">
      <span class="status-dot" id="devStatus"></span>
      <span id="devStatusText" class="muted">Checking devices...</span>
      <button class="btn-secondary" id="refreshDevices">Refresh</button>
    </div>
  </div>
</div>

<!-- Move-to-folder popover -->
<div class="popover hidden" id="folderPop"></div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script src="bridge.js"></script>
<script src="app.js"></script>
<script>
window.addEventListener("load", () => setTimeout(() => {
  const card = document.querySelector(".card");
  if (card) card.click();
}, 800));
</script></body>
</html>

name = "double-scribe"
pages_build_output_dir = "public"
compatibility_date = "2026-07-08"
# Stripe's Node SDK needs Node builtins (crypto) even when using its fetch-based
# HTTP client; Pages Functions run on Workers, so this flag is required.
compatibility_flags = ["nodejs_compat"]

# Download-tracking event log (see functions/api/download.js + api/stats.js).
# The dataset is created automatically on first write -- no setup needed.
[[analytics_engine_datasets]]
binding = "DOWNLOADS"
dataset = "double_scribe_downloads"
